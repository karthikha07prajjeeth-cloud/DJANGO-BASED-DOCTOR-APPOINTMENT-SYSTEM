{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/doctor.css' %}">
</head>
<body>
     <div class="container">
        {% for doctor in data %}
        <div class="card">
            <img src="{{ doctor.doctor_image.url }}" alt="">
            <h3>{{ doctor.doctor_name }}</h3>
            <p>{{ doctor.doctor_fees }}</p>
            <p>{{ doctor.doctor_dept }}</p>
            <a href="{% url 'product_detail' doctor.id %}"><button>VIEW DETAILS</button></a>
        </div>
        {% endfor %}
     </div>
</body>
</html>
